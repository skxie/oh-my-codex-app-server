name: runtime-layer1

on:
  pull_request:
    paths:
      - "codex-rs/runtime-api/**"
      - "codex-rs/core/**"
      - "codex-rs/codex-api/**"
      - "codex-rs/app-server/**"
      - "codex-rs/app-server-client/**"
      - "codex-rs/app-server-sdk/**"
      - "codex-rs/memories/write/**"
      - "justfile"
      - ".github/workflows/runtime-layer1.yml"
  push:
    branches:
      - main
      - "**runtime-extension-layer1**"
      - "**layer1**"
      - "**full-ci**"
    paths:
      - "codex-rs/runtime-api/**"
      - "codex-rs/core/**"
      - "codex-rs/codex-api/**"
      - "codex-rs/app-server/**"
      - "codex-rs/app-server-client/**"
      - "codex-rs/app-server-sdk/**"
      - "codex-rs/memories/write/**"
      - "justfile"
      - ".github/workflows/runtime-layer1.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}::${{ github.event.pull_request.number > 0 && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
  cancel-in-progress: true

# Cargo's libgit2 transport has been flaky when fetching git dependencies with
# nested submodules. Prefer the system git CLI across every Cargo invocation.
env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  pre-push-layer1:
    name: Layer 1 pre-push gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: rustfmt

      - uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2.62.49
        with:
          tool: just

      - uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2.62.49
        with:
          tool: nextest
          version: 0.9.103

      - name: Run Layer 1 pre-push gate
        run: just pre-push-layer1
